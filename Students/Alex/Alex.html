<!DOCTYPE html>
<html>
<head>
    <title>My Awesome Page</title>
    <style>
        
        body {
            background-color: lightblue; /* Background color */
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .profile-card {
            background: white;
            border: 5px solid darkblue; /* A thick border */
            border-radius: 20px;       /* Rounded corners */
            width: 300px;
            margin: 50px auto;         /* Centers the box */
            padding: 20px;
        }
        button {
            background-color: orange;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background-color: yellow; /* Changes color when you touch it */
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>Hi, I'm [Alex]!</h1>
        <p>I am in 6th grade and I love coding.</p>
        
        <h3>My Top 3 Hobbies:</h3>
        <ul style="text-align: left;">
            <li>video games </li>
            <li>baseball </li>
            <li>sleeping</li>
        </ul>

        <button onclick="alert('You clicked the button!')">Click Me!</button>
    </div>

</body>
</html>
